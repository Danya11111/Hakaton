name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          DOMAIN: ${{ secrets.DOMAIN }}
          COMPOSE_FILE: ${{ secrets.COMPOSE_FILE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          envs: APP_DIR,PROD_ENV_FILE,DOMAIN,COMPOSE_FILE
          script: |
            set -euo pipefail
            export APP_DIR="${APP_DIR:-/opt/arhipovdan/app}"
            export PROD_ENV_FILE="${PROD_ENV_FILE:-.env.production}"
            export DOMAIN="${DOMAIN:-arhipovdan.ru}"
            export COMPOSE_FILE="${COMPOSE_FILE:-docker-compose.prod.yml}"
            bash "$APP_DIR/scripts/deploy.sh"
