name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Prisma generate / next build не подключаются к БД при текущей конфигурации страниц
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
          ADMIN_SESSION_SECRET: "01234567890123456789012345678901"
          ADMIN_USERNAME: ci
          ADMIN_PASSWORD: ci
        run: npm run build
